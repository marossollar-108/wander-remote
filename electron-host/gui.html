<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <title>Wander Remote Host</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #fff;
      color: #1A1A1A;
      display: flex;
      flex-direction: column;
      height: 100vh;
      user-select: none;
    }
    .header {
      background: #EB002F;
      color: white;
      text-align: center;
      padding: 16px;
      font-size: 18px;
      font-weight: bold;
    }
    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      gap: 16px;
    }
    .info {
      text-align: center;
      font-size: 14px;
      color: #777;
    }
    .port {
      font-size: 32px;
      font-weight: bold;
      font-family: monospace;
      color: #1A1A1A;
    }
    .status {
      font-size: 14px;
      color: #777;
      padding: 8px 16px;
      background: #F5F5F5;
      border-radius: 8px;
    }
    .footer {
      text-align: center;
      padding: 12px;
      font-size: 11px;
      color: #A5A5A5;
    }
  </style>
</head>
<body>
  <div class="header">Wander Remote Host</div>
  <div class="content">
    <div class="info">Server bezi na porte</div>
    <div class="port" id="port">7417</div>
    <div class="status" id="status">Startujem...</div>
  </div>
  <div class="footer">Powered by Tulave kino</div>
  <script>
    const { ipcRenderer } = require('electron');
    ipcRenderer.on('status', (_, text) => {
      document.getElementById('status').textContent = text;
    });
  </script>
</body>
</html>
