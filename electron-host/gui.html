<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <title>Wander Remote Host</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #fff;
      color: #1A1A1A;
      display: flex;
      flex-direction: column;
      height: 100vh;
      user-select: none;
    }
    .header {
      background: #EB002F;
      color: white;
      text-align: center;
      padding: 16px;
      font-size: 18px;
      font-weight: bold;
    }
    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      gap: 12px;
    }
    .label { font-size: 12px; color: #999; }
    .value {
      font-size: 28px;
      font-weight: bold;
      font-family: monospace;
      letter-spacing: 4px;
    }
    .row {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }
    .status {
      font-size: 13px;
      color: #777;
      padding: 8px 16px;
      background: #F5F5F5;
      border-radius: 8px;
      margin-top: 8px;
    }
    .hide-btn {
      margin-top: 12px;
      padding: 8px 24px;
      background: #EB002F;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      font-weight: 500;
    }
    .hide-btn:hover {
      background: #C40028;
    }
    .hide-hint {
      font-size: 11px;
      color: #999;
      margin-top: 4px;
    }
    .footer {
      text-align: center;
      padding: 12px;
      font-size: 11px;
      color: #A5A5A5;
    }
  </style>
</head>
<body>
  <div class="header">Wander Remote Host</div>
  <div class="content">
    <div class="row">
      <div class="label">Host ID</div>
      <div class="value" id="sessionId">---</div>
    </div>
    <div class="row">
      <div class="label">Heslo</div>
      <div class="value" id="password">---</div>
    </div>
    <div class="status" id="status">Startujem...</div>
    <button class="hide-btn" id="hideBtn">Skryt do pozadia</button>
    <div class="hide-hint">Aplikacia bezi dalej v systemovej liste</div>
  </div>
  <div class="footer">Powered by Tulave kino</div>
  <script>
    const { ipcRenderer } = require('electron');
    const { getCurrentWindow } = require('electron').remote || {};

    ipcRenderer.on('status', (_, text) => {
      document.getElementById('status').textContent = text;
    });
    ipcRenderer.on('session', (_, data) => {
      document.getElementById('sessionId').textContent = data.id;
      document.getElementById('password').textContent = data.password;
    });

    document.getElementById('hideBtn').addEventListener('click', () => {
      window.close();
    });
  </script>
</body>
</html>
