# Nginx config pre Wander Remote relay server
# Umiestnit do /etc/nginx/sites-available/wander-relay
# ln -s /etc/nginx/sites-available/wander-relay /etc/nginx/sites-enabled/

upstream wander_relay {
    server 127.0.0.1:8765;
}

server {
    listen 80;
    server_name relay.wanderremote.com;

    # Redirect HTTP -> HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name relay.wanderremote.com;

    # SSL — certbot / Let's Encrypt
    ssl_certificate /etc/letsencrypt/live/relay.wanderremote.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/relay.wanderremote.com/privkey.pem;

    # WebSocket proxy
    location / {
        proxy_pass http://wander_relay;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket timeouts
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;

        # Buffer settings for frame data
        proxy_buffering off;
        proxy_buffer_size 64k;
    }
}
