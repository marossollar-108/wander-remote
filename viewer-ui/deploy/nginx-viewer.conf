# Nginx config pre Wander Remote Viewer (PWA)
# Static files z dist/ adresara

server {
    listen 80;
    server_name remote.wanderremote.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name remote.wanderremote.com;

    ssl_certificate /etc/letsencrypt/live/remote.wanderremote.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/remote.wanderremote.com/privkey.pem;

    root /home/forge/wander-remote-viewer/dist;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Cache icons
    location /icons/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Service worker — no cache
    location /sw.js {
        expires off;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location /manifest.webmanifest {
        expires off;
        add_header Cache-Control "no-cache";
        add_header Content-Type "application/manifest+json";
    }
}
